name: Fastyle AI Marketing Pipeline

on:
  schedule:
    - cron: '0 * * * *' # يعمل كل ساعة
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install telethon pillow requests google-genai rembg arabic-reshaper python-bidi

      - name: 1. Scrape Telegram
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TG_SESSION }}
        run: python scraper.py

      - name: 2. Generate AI Content (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gemini_test.py

      - name: 3. Create Studio Collage (AI Background Removal)
        run: python image_processor.py

      - name: 4. Publish to Facebook (Post & Story)
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python publish_to_facebook.py
