name: Fastyle AI Marketing Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # نقلنا لسيرفرات لينكس السريعة والمستقرة
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies (FFMPEG)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install telethon pillow requests opencv-python-headless numpy arabic-reshaper python-bidi edge-tts
      - name: 1. Scrape Telegram (Queue System)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python read_channel.py

      - name: 2. Generate AI Content (Marketing Psychology)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gemini_test.py

      - name: 3. Create Studio Collage & Dynamic Reel
        run: python image_processor.py

      - name: 4. Publish to Facebook (Post, Story, Reels)
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python publish_to_facebook.py
        
      - name: 5. Send Reports to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_to_telegram.py

      - name: 6. Commit Database (Save Memory & Dashboard)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # أمر صارم لدمج أي تغييرات قبل الرفع لمنع رفض السيرفر
          git pull origin main --rebase --autostash || true
          git add posted_ids.json dashboard.csv || true
          git commit -m "Auto-update DB and Dashboard" || echo "No changes to commit"
          # رفع إجباري وآمن لتأكيد حفظ الذاكرة
          git push origin HEAD:main
