name: Fastyle AI Marketing Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install telethon pillow requests opencv-python-headless numpy arabic-reshaper python-bidi gTTS
      - name: 1. Scrape Telegram (Queue System)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python read_channel.py

      - name: 2. Generate AI Content (Marketing Psychology)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gemini_test.py

      - name: 3. Create Studio Collage & Dynamic Reel
        run: python image_processor.py

      - name: 4. Publish to Facebook (Post, Story, Reels)
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python publish_to_facebook.py
        
      - name: 5. Send Reports to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_to_telegram.py

      - name: 6. Commit Database (Save Memory)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posted_ids.json
          git commit -m "Auto-update posted products DB" || echo "No new products to save"
          git push
