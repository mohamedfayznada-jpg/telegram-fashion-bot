name: Fastyle Hourly Publisher

on:
  schedule:
    - cron: '0 * * * *' # يعمل كل ساعة رأسية
  workflow_dispatch: # زرار للتشغيل اليدوي

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري عشان يقدر يرفع ملف الأسعار لجيتهاب

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: pip install telethon pillow requests

      - name: Run Publisher Script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_CHANNEL: ${{ secrets.TG_CHANNEL }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python fastyle_publisher.py

      - name: Commit and Push Changes (State & Prices)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_message_id.txt prices.json
          # هيعمل كوميت بس لو في ملفات اتغيرت
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update prices and last message ID"
          git push
